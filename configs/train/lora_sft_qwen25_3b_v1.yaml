# LLaMA-Factory smoke training config (v1)

model_name_or_path: /path/to/Qwen2.5-3B-Instruct
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

dataset_dir: data
dataset: paper_assistant_v1_train
eval_dataset: paper_assistant_v1_val
template: qwen
cutoff_len: 1024
max_samples: 200
overwrite_cache: true
preprocessing_num_workers: 4

output_dir: outputs/qwen25_3b_lora_v1_smoke
logging_steps: 10
save_steps: 50
eval_steps: 50
plot_loss: true
overwrite_output_dir: true

per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1

bf16: true
ddp_timeout: 180000
